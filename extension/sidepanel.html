<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="xterm.css">
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; margin: 8px; }
    #status { color: #555; margin-bottom: 6px; min-height: 1.2em; }
    #prompt { width: 100%; box-sizing: border-box; height: 72px; }
    #extraArgs { width: 100%; box-sizing: border-box; margin-top: 4px; font-family: monospace; font-size: 12px; }
    #term { height: 60vh; min-height: 240px; margin-top: 6px; border: 1px solid #444; background: #000; }
    #prSection { border: 1px solid #ddd; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
    #prMeta { color: #888; font-size: 11px; }
    .pr-row { display: flex; gap: 6px; align-items: baseline; padding: 2px 0; cursor: pointer; }
    .pr-row:hover { background: #f4f8ff; }
    .pr-ref { font-family: monospace; color: #369; white-space: nowrap; }
    .pr-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .pr-author { color: #888; font-size: 11px; white-space: nowrap; }
    .pr-empty { color: #888; }
    .row { display: flex; gap: 6px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
    button { cursor: pointer; }
    #timeline { border-top: 1px solid #ddd; margin-top: 8px; padding-top: 8px; }
    .ev { margin: 4px 0; }
    .ev-text { white-space: pre-wrap; }
    .ev-tool { color: #0a6; font-family: monospace; }
    .ev-stderr { color: #a55; font-family: monospace; white-space: pre-wrap; }
    .ev-proc { color: #369; }
    .ev-error { color: #c00; }
    .ev-result { border: 1px solid #9c9; background: #f4fff4; padding: 6px; border-radius: 4px; white-space: pre-wrap; }
    details { color: #777; }
    details pre { max-height: 160px; overflow: auto; }
    #authBanner { border: 1px solid #e0b050; background: #fff7e5; padding: 8px; border-radius: 4px; margin-bottom: 6px; }
    #authBanner .steps { color: #775; margin-top: 4px; }
    #authBanner code { background: #f2ead5; padding: 0 3px; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="status">host 未接続</div>
  <div id="prSection">
    <div class="row">
      <b>draft PR</b>
      <button id="prReload">一覧更新</button>
      <span id="prMeta"></span>
    </div>
    <div id="prList"></div>
  </div>
  <div id="authBanner" hidden>
    ⚠️ <span id="authReason">claude が未ログインの可能性があります</span> —
    <a href="https://github.com/ippoan/cc-webreview-ext/blob/main/docs/spike-claude-chrome.md"
       target="_blank" rel="noreferrer">解決手順を開く</a>
    <div class="steps">
      claude を最新化 → <code>claude setup-token</code> →
      <code>setx CLAUDE_CODE_OAUTH_TOKEN "&lt;token&gt;"</code> → Chrome 完全再起動
    </div>
  </div>
  <textarea id="prompt" placeholder="claude に渡す prompt (例: このリポジトリの README を要約して)"></textarea>
  <input id="extraArgs" type="text"
         placeholder="追加 CLI 引数 (空白区切り。例: --allowedTools mcp__claude-in-chrome__navigate)"
         title="-p は対話承認できないため、ツールを使う場合は --allowedTools 等をここで許可する。空白を含む値は未対応">
  <div class="row">
    <label><input type="checkbox" id="chrome"> --chrome</label>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <button id="ping">Ping</button>
    <button id="checkUpdate">更新確認</button>
    <button id="termStart" title="対話モードの claude を PTY 起動 (権限承認に応答できる)">Terminal</button>
    <button id="termKill" hidden>Term 終了</button>
  </div>
  <div id="term" hidden></div>
  <div id="timeline"></div>
  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
