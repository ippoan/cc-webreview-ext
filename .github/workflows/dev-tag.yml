name: Dev Tag

# SOURCE-MIRROR: ippoan/cdp-relay:.github/workflows/rust-dev-tag.yml
# host/ か extension/ が main に入ったら dev タグ (`agent-dev-N`) を自動採番する。
# tag push が release.yml を連鎖発火させ、MSI + 拡張 zip を dev prerelease として配布する。
#
# - prefix `agent-dev-` で将来の他 tag 空間と分離する。
# - 連鎖発火には PAT が必要 (GITHUB_TOKEN で打つ tag は他 workflow を起こさない)。
#   TAG_RELEASE_PAT が未設定だと tag は打たれるが release.yml が起動しない。

on:
  push:
    branches: [main]
    paths:
      - 'host/**'
      - 'extension/**'
      - '.github/workflows/dev-tag.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  dev-tag:
    uses: ippoan/ci-workflows/.github/workflows/dev-tag-release.yml@main
    with:
      prefix: agent-dev-
    secrets:
      TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
