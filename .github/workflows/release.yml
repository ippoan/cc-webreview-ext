name: Release

# SOURCE-MIRROR: ippoan/cdp-relay:.github/workflows/release-msi.yml (構成を PR-build に変更)
# Windows MSI (cargo-wix) + 拡張 zip をビルドして GitHub Release に添付する
# (cc-webreview-ext#6)。MSI は host exe + MV3 拡張を同梱し、install 時の custom action で
# native host を HKCU 登録する — git clone 不要で「MSI 1 発 → 拡張フォルダを読み込む」。
#
# 起動経路は 2 つ (build は各経路 1 回だけ — main merge 後の再ビルドはしない):
#   1. workflow_call — ci.yml の dev-release job が PR の CI から呼ぶ。
#      tag `agent-dev-<run_number>` の prerelease を PR head に打つ。
#   2. push tags 'agent-v*' — stable。tag をそのまま Release にする (非 prerelease = Latest)。
#
# NOTE: MSI ビルドは CCoW で検証できず windows-latest + WiX toolset 依存。cargo-wix の
# フラグや CargoTargetBinDir 解決は初回 CI で要調整 (cdp-relay と同じ注意書き)。

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release の tag 名 (例 agent-dev-123)。未指定なら push された tag を使う。'
        required: true
        type: string
      target_commitish:
        description: 'tag を打つ先の SHA (PR head)。checkout もこの ref で行う。'
        required: true
        type: string
    secrets:
      MINISIGN_SECRET_KEY:
        description: |
          minisign の無パスワード秘密鍵 (`minisign -G -W` の .key の中身、2 行)。
          各 .zip を署名し `<asset>.minisig` を Release に添付する。agent self-update
          (update.rs) は署名検証に通らない asset を適用しないため **必須**。
          cdp-relay と共用の org secret (caller は `secrets: inherit` で渡す)。
        required: true
  push:
    tags:
      - 'agent-v*'

permissions:
  contents: write

jobs:
  msi:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: host
    env:
      # run へ直接 ${{ }} 展開しない (tag 名は $() 等を含み得るため env 経由)。
      TAG: ${{ inputs.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_call (PR dev release) では tag を打つ head SHA と同じコードを
          # ビルドする。tag push では default (= tag の commit)。
          ref: ${{ inputs.target_commitish || '' }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: host
          shared-key: cc-webreview-release

      - name: Build cc-webreview-agent (release)
        env:
          CC_WEBREVIEW_RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
        run: cargo build --release --locked -p cc-webreview-agent

      - name: Compute version (dev-N -> 0.0.N / vX.Y.Z -> X.Y.Z)
        id: ver
        shell: bash
        run: |
          if [[ "$TAG" =~ ^agent-dev-([0-9]+)$ ]]; then
            echo "version=0.0.${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^agent-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::tag が想定形式 (agent-dev-N / agent-vX.Y.Z) ではない: $TAG"
            exit 1
          fi

      - name: Bundle MV3 extension (manifest stamp + CargoTargetBinDir\extension に配置)
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p target/release/extension
          cp ../extension/manifest.json ../extension/background.js \
             ../extension/sidepanel.html ../extension/sidepanel.js \
             target/release/extension/
          # manifest version を tag 由来の版に stamp する (side panel の版表示 /
          # 将来の拡張自動更新比較を機能させる)。
          VER="$VER" node -e "const fs=require('fs');const p='target/release/extension/manifest.json';const m=JSON.parse(fs.readFileSync(p));m.version=process.env.VER;fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n')"
          echo "extension manifest version -> ${VER}"

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI (no rebuild, reuse target/release)
        run: >
          cargo wix --package cc-webreview-agent --no-build --nocapture
          --install-version ${{ steps.ver.outputs.version }}
          --output target/wix/cc-webreview-agent-${{ steps.ver.outputs.version }}-x86_64.msi

      - name: Package extension zip + sha256
        # windows-latest に zip コマンドが無いので PowerShell の Compress-Archive を使う。
        shell: pwsh
        run: |
          $zip = "cc-webreview-extension-$env:TAG.zip"
          # target/release/extension の中身を flat に固める (chrome unpacked 読込用)。
          Compress-Archive -Path "target/release/extension/*" -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash" | Out-File -Encoding ascii "$zip.sha256"
          $msi = Get-Item target/wix/*.msi
          $mhash = (Get-FileHash $msi -Algorithm SHA256).Hash.ToLower()
          "$mhash" | Out-File -Encoding ascii "$($msi.FullName).sha256"
          Get-Item $zip

      - name: Package agent zip + sha256 (self-update 配布物)
        # update.rs (self-update) が DL する asset。名前に x86_64-pc-windows-msvc を
        # 含める (pick_windows_asset のマーク) — 拡張 zip と混同されない命名にする。
        shell: pwsh
        run: |
          $zip = "cc-webreview-agent-$env:TAG-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "target/release/cc-webreview-agent.exe" -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash" | Out-File -Encoding ascii "$zip.sha256"
          Get-Item $zip

      - name: Stage dist
        # 署名 (minisign) は ubuntu の publish job で一括して行うため artifact で渡す。
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/wix/*.msi target/wix/*.msi.sha256 dist/
          cp cc-webreview-extension-*.zip cc-webreview-extension-*.zip.sha256 dist/
          cp cc-webreview-agent-*-x86_64-pc-windows-msvc.zip \
             cc-webreview-agent-*-x86_64-pc-windows-msvc.zip.sha256 dist/
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: host/dist/*
          if-no-files-found: error

  # 全 asset を ubuntu で一括 minisign 署名して Release を作る (per-OS runner に
  # minisign を入れるより単純 — ci-workflows rust-binary-release.yml と同型)。
  publish:
    runs-on: ubuntu-latest
    needs: msi
    env:
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Sign archives with minisign
        # update.rs は .minisig の無い asset を適用しないため、署名は必須 (skip しない)。
        # secret 未着は loud fail — 「署名なし Release が黙って出る」方が実害が大きい。
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY が空 (org secret 未設定か workflow_call の secrets 未転送)"
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y minisign
          # 秘密鍵は file 経由でのみ minisign に渡し、終了時に shred する。
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          shopt -s nullglob
          signed=0
          for f in dist/*.zip; do
            minisign -S -s "$RUNNER_TEMP/minisign.key" -m "$f" -x "$f.minisig" </dev/null
            signed=$((signed + 1))
          done
          shred -u "$RUNNER_TEMP/minisign.key"
          echo "signed $signed archive(s)"
          ls -la dist/

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          # workflow_call (dev) では tag が未存在なので PR head に打つ。
          target_commitish: ${{ inputs.target_commitish || '' }}
          # `-dev-` を含む tag は prerelease。揃えないと dev-* が非 prerelease で
          # 作られ "Latest" を奪う (cdp-relay で実害)。
          # stable tag (agent-vX.Y.Z) は非 prerelease のまま → Latest になる。
          prerelease: ${{ contains(inputs.tag_name || github.ref_name, '-dev-') }}
          files: dist/*
          fail_on_unmatched_files: true
